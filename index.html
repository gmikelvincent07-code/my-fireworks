<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>For Someone Special 💖</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- START SCREEN -->
  <div id="startScreen">
    <h2>Enter Name</h2>
    <input type="text" id="nameInput" placeholder="Name here...">

    <h2>Your Message</h2>
    <input type="text" id="messageInput" placeholder="Type something...">

    <button onclick="startAnimation()">Start 💌</button>
  </div>

  <!-- MAIN CONTENT -->
  <div id="mainContent">
    <h1 id="topName"></h1>
    <h2 id="mainText"></h2>
    <h3 id="bottomName"></h3>
  </div>

  <!-- ROCKET -->
  <div class="rocket">🚀</div>

  <script src="script.js"></script>
</body>
</html>
